<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 340px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4285f4, #34a853);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
      margin-right: 12px;
    }
    
    h1 {
      font-size: 16px;
      color: #202124;
      font-weight: 600;
    }
    
    .page-info {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .page-title {
      font-size: 13px;
      color: #202124;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .page-url {
      font-size: 11px;
      color: #5f6368;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    #saveBtn {
      width: 100%;
      padding: 12px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    #saveBtn:hover {
      background: #3367d6;
    }
    
    #saveBtn:active {
      background: #2850a8;
    }
    
    #saveBtn:disabled {
      background: #dadce0;
      cursor: not-allowed;
    }
    
    #saveBtn .icon {
      font-size: 16px;
    }
    
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      line-height: 1.5;
    }
    
    .status.success {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #81c995;
    }
    
    .status.error {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f28b82;
    }
    
    .status.loading {
      background: #e8f0fe;
      color: #1967d2;
      border: 1px solid #8ab4f8;
    }
    
    .status .path {
      font-family: monospace;
      background: rgba(0,0,0,0.05);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
    }
    
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: #5f6368;
    }
    
    .image-options {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 13px;
      color: #202124;
    }
    
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    
    .option-hint {
      margin-top: 6px;
      font-size: 11px;
      color: #5f6368;
      padding-left: 24px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">MD</div>
    <h1>Web to Markdown</h1>
  </div>
  
  <div class="page-info">
    <div class="page-title" id="pageTitle">加载中...</div>
    <div class="page-url" id="pageUrl"></div>
  </div>
  
  <div class="image-options">
    <label class="checkbox-label">
      <input type="checkbox" id="downloadImages" checked>
      <span>下载图片到本地</span>
    </label>
    <div class="option-hint">
      图片将保存在Markdown文件同级的资源文件夹中
    </div>
  </div>
  
  <button id="saveBtn">
    <span class="icon">↓</span>
    <span>保存为 Markdown</span>
  </button>
  
  <div id="status" class="status"></div>
  
  <div class="footer">
    点击按钮将当前页面转换为 Markdown
  </div>
  
  <script src="../../lib/turndown.min.js"></script>
  <script src="../utils/imageExtractor.js"></script>
  <script src="../utils/imageDownloader.js"></script>
  <script src="../utils/imagePathManager.js"></script>
  <script src="../utils/converter.js"></script>
  <script src="../utils/fileSaver.js"></script>
  <script src="popup.js"></script>
</body>
</html>
